version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-deps:
        patterns:
          - "*"

  - package-ecosystem: "pub"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      pub-deps:
        patterns:
          - "*"